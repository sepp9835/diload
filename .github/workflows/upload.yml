name: Move uploads to /files

on:
  push:
    branches:
      - uploads  # frontend commits go here

jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create files directory
        run: mkdir -p files

      - name: Move uploaded files to /files
        run: |
          for f in *; do
            if [[ "$f" != ".github" ]]; then
              mv "$f" files/ || true
            fi
          done

      - name: Commit files to main
        env:
          GH_PAT: ${{ secrets.GH_PAT }}   # 🔹 secret used here
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout main
          cp -r files/* files/ || true
          git add files/*
          git commit -m "Add uploaded files from workflow" || echo "No changes"
          git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }} main
