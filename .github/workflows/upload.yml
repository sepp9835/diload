name: Move Uploads to Files

on:
  push:
    branches:
      - uploads

jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create /files directory if missing
        run: mkdir -p files

      - name: Move uploaded files
        run: |
          for f in *; do
            if [ "$f" != ".github" ]; then
              mv "$f" files/ || true
            fi
          done

      - name: Commit files to main
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout main
          cp -r files/* files/ || true
          git add files/*
          git commit -m "Add uploaded files from workflow" || echo "No changes to commit"
          git push origin main
