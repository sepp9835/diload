name: Move uploads to /files

on:
  push:
    branches:
      - uploads  # frontend “uploads branch”

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Prepare /files directory
        run: mkdir -p files

      - name: Move files from uploads branch
        run: |
          # Move everything except .github folder
          for f in *; do
            if [[ "$f" != ".github" ]]; then
              mv "$f" files/ || true
            fi
          done

      - name: Commit files to main
        env:
          GH_PAT: ${{ secrets.GH_PAT }}   # <- store your PAT here
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout main
          cp -r files/* files/ || true
          git add files/*
          git commit -m "Add uploaded files from workflow" || echo "No changes"
          git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }} main
