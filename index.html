<script>
const USER = "sepp9835";
const REPO = "diload";
const TOKEN = "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"; // Keep secret in GitHub, not real users

const drop = document.getElementById("drop");
const input = document.getElementById("fileInput");
const output = document.getElementById("output");

drop.onclick = () => input.click();
drop.ondragover = e => e.preventDefault();
drop.ondrop = e => { e.preventDefault(); upload(input.files[0]); };
input.onchange = () => upload(input.files[0]);

async function upload(file) {
  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(",")[1];
    output.value = `Uploading "${file.name}"...\n`;

    const payload = {
      message: `Upload ${file.name}`,
      branch: "uploads",
      content: base64,
      path: file.name
    };

    try {
      const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${file.name}`, {
        method: "PUT",
        headers: {
          "Authorization": `token ${TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      console.log(data);

      if (response.status === 201 || response.status === 200) {
        output.value += "✅ File committed to uploads branch. GitHub Action will move it to /files.\n";
        output.value += `Direct download link (after workflow): https://${USER}.github.io/${REPO}/files/${file.name}`;
      } else {
        output.value += `❌ Error: ${JSON.stringify(data)}`;
      }
    } catch (err) {
      console.error(err);
      output.value += `❌ Error: ${err}`;
    }
  };

  reader.readAsDataURL(file);
}
</script>
