<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Uploader</title>
  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #drop {
      border: 2px dashed #444;
      padding: 40px;
      cursor: pointer;
      text-align: center;
    }
    textarea {
      width: 100%;
      margin-top: 10px;
      height: 120px;
    }
  </style>
</head>
<body>

<div>
  <div id="drop">Drop file or click</div>
  <input type="file" id="fileInput" hidden>
  <textarea id="output" readonly></textarea>
</div>

<script>
const USER = "sepp9835";
const REPO = "diload";
const TOKEN = "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";

const drop = document.getElementById("drop");
const input = document.getElementById("fileInput");
const output = document.getElementById("output");

drop.onclick = () => input.click();
drop.ondragover = e => e.preventDefault();
drop.ondrop = e => {
  e.preventDefault();
  upload(e.dataTransfer.files[0]);
};
input.onchange = () => upload(input.files[0]);

async function upload(file) {
  const reader = new FileReader();

  reader.onload = async () => {
    const base64 = reader.result.split(",")[1];

    output.value = `Uploading "${file.name}"...\n`;

    try {
      const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/dispatches`, {
        method: "POST",
        headers: {
          "Authorization": "token " + TOKEN,
          "Content-Type": "application/json",
          "Accept": "application/vnd.github.everest-preview+json"
        },
        body: JSON.stringify({
          event_type: "upload-file",
          client_payload: {
            name: file.name,
            content: base64
          }
        })
      });

      console.log("GitHub API response:", response);

      if (response.status === 204) {
        output.value += "✅ File successfully sent to GitHub Actions!\n";
        output.value += `Check Actions tab: https://github.com/${USER}/${REPO}/actions\n`;
        output.value += `Expected file URL (after workflow finishes):\nhttps://${USER}.github.io/${REPO}/files/${file.name}`;
      } else {
        const text = await response.text();
        output.value += `❌ GitHub API returned status ${response.status}\n`;
        output.value += text;
      }
    } catch (err) {
      console.error(err);
      output.value += `❌ Error: ${err}`;
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
